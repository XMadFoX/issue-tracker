services:
  pg:
    image: pgvector/pgvector:0.8.1-pg18-trixie
    volumes:
      - pg:/var/lib/postgresql
    ports:
      - ${PG_BIND_PORT:-5432}:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: issue_tracker

  web:
    image: docker.io/library/tss-web
    build:
      context: .
      dockerfile: apps/tss-web/Dockerfile
      secrets:
        - source: env
          target: env
    ports:
      - 3000:3000

  nats:
    image: nats
    ports:
      - "4222:4222"
      - "8222:8222" # monitoring
    command: "--http_port 8222 -js"

  pg-http-proxy-rs:
    image: xmadfox/pg-http-proxy-rs:0.1.5
    profiles: ["serverless"]
    ports:
      - 8080:8080
    environment:
      DATABASE_URL: postgres://postgres:postgres@pg:5432/issue_tracker
      AUTH_TOKENS: dev
      BIND_ADDR: 0.0.0.0:8080

volumes:
  pg:

secrets:
  env:
    file: ${WEB_BUILD_ENV_FILE:-/proc/self/environ}
