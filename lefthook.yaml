commit-msg:
  commands:
    "commitlint":
      run: commitlint
pre-commit:
  commands:
    require-gpg-signing:
      run: |
        if [ "$(git config --bool commit.gpgsign)" != "true" ]; then
          echo "GPG signing is required. Enable it with: git config commit.gpgsign true" >&2
          exit 1
        fi
    check:
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}"
      run: biome check --write --no-errors-on-unmatched --colors=off {staged_files}
      stage_fixed: true
